[supervisord]
nodaemon=true
user=root

[program:xvfb]
command=/usr/bin/Xvfb :99 -screen 0 %(ENV_RESOLUTION)s -ac +extension GLX +render -noreset
autorestart=true
priority=10

[program:chromium]
command=/usr/local/bin/start-chromium.sh
user=browser
environment=DISPLAY=":99",HOME="/home/browser"
autorestart=true
priority=20
startsecs=5

[program:x11vnc]
command=/usr/bin/x11vnc -display :99 -forever -shared -nopw -rfbport 5900 -noxdamage
autorestart=true
priority=30

[program:novnc]
command=/usr/bin/websockify --web /usr/share/novnc 80 localhost:5900
autorestart=true
priority=40

[program:socat]
command=/usr/bin/socat TCP-LISTEN:9222,fork,reuseaddr TCP:localhost:9220
autorestart=true
priority=50
